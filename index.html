<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Hash Mixer</title>
    <link rel="apple-touch-icon" href="image_21.png">
    <link rel="icon" type="image/png" href="image_21.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --placeholder: #bbb;
        }

        /* 長押しメニュー抑制（全体） */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none;
            user-select: none;
        }

        /* テキストエリアのみ選択・入力を許可 */
        textarea {
            -webkit-touch-callout: default !important;
            user-select: text !important;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .fridge-container { 
            width: 100%; 
            max-width: 400px; 
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title-group { text-align: left; }
        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .subtitle { color: #999; font-size: 0.8rem; font-weight: 600; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 12px;
            border-radius: 10px;
        }

        .input-group { 
            position: relative; 
            margin-bottom: 15px; 
        }

        textarea {
            width: 100%;
            height: 250px;
            background: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            padding-right: 45px;
            font-size: 16px;
            color: var(--main);
            resize: none;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
            transition: border-color 0.2s;
            font-weight: 500;
            line-height: 1.5;
        }
        textarea:focus { border-color: var(--main); }
        textarea::placeholder { color: var(--placeholder); -webkit-text-fill-color: var(--placeholder); }

        .clr-btn {
            position: absolute;
            right: 12px;
            top: 15px;
            width: 28px;
            height: 28px;
            background: #ddd;
            color: #666;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            z-index: 5;
        }
        textarea:not(:placeholder-shown) + .clr-btn { display: flex; }

        #statusMessage {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--main);
            height: 24px;
            margin-bottom: 10px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .main-btn {
            width: 100%;
            background: var(--main);
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            -webkit-appearance: none;
            transition: background 0.2s;
        }
        .main-btn:active { transform: scale(0.98); }
        .main-btn.active { background: #000; }

        .footer-btns { 
            margin-top: auto;
            padding-top: 40px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 30px; 
        }

        .kofi-btn, .home-btn {
            width: 100%;
            max-width: 250px;
            padding: 14px;
            border-radius: var(--radius);
            font-weight: 800;
            font-size: 0.9rem;
            text-decoration: none;
            text-align: center;
            border: none;
            cursor: pointer;
        }
        .kofi-btn { background: #fff; color: var(--main); border: 2px solid var(--main); }
        .home-btn { background: var(--accent); color: var(--main); }

        footer { 
            width: 100%;
            padding-bottom: 20px;
            text-align: center;
            font-size: 0.75rem; 
            color: #bbb; 
            font-weight: 600;
            line-height: 1.6; 
        }
        footer a { color: inherit; text-decoration: underline; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); width: 85%; max-width: 320px; text-align: center; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #aaa; font-weight: bold; }
    </style>
</head>
<body>

<div class="fridge-container">
    <header>
        <div class="title-group">
            <h1>Hash Mixer</h1>
            <p class="subtitle">Shuffle tags to stay under the radar.</p>
        </div>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <div class="input-group">
        <textarea id="input" placeholder="Paste your hashtags here..."></textarea>
        <button id="clear" class="clr-btn">×</button>
    </div>

    <div id="statusMessage"></div>

    <button class="main-btn" id="mixBtn">Mix & Copy</button>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️Buy me a coffee</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a><br>
        afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="close">&times;</span>
        <h3 style="margin-top:0">📱 Install</h3>
        <p style="font-size:0.9rem; color:#666">Add to home screen.<br><br>🍏 <b>Safari</b>: Share > Add to Home Screen<br>🤖 <b>Chrome</b>: Menu > Add to home screen</p>
    </div>
</div>

<script>
    const input = document.getElementById('input');
    const mixBtn = document.getElementById('mixBtn');
    const statusMsg = document.getElementById('statusMessage');
    const clearBtn = document.getElementById('clear');
    const modal = document.getElementById('modal');

    mixBtn.addEventListener('click', () => {
        const rawText = input.value.trim();
        if (!rawText) return;

        // ハッシュタグを抽出（スペース、カンマ、改行、全角スペース等で分割）
        let tags = rawText.split(/[\s,、]+/).filter(t => t.length > 0);

        // ハッシュ記号がない場合に自動付与するロジック
        tags = tags.map(t => t.startsWith('#') ? t : '#' + t);

        // フィッシャー–イェーツのシャッフル
        for (let i = tags.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [tags[i], tags[j]] = [tags[j], tags[i]];
        }

        const processed = tags.join(' ');
        input.value = processed;

        navigator.clipboard.writeText(processed).then(() => {
            statusMsg.textContent = `✨ ${tags.length} tags shuffled & Copied!`;
            statusMsg.style.opacity = '1';
            
            const originalText = mixBtn.textContent;
            mixBtn.textContent = 'Copied!';
            mixBtn.classList.add('active');
            
            setTimeout(() => {
                mixBtn.textContent = originalText;
                mixBtn.classList.remove('active');
                statusMsg.style.opacity = '0';
            }, 2000);
        });
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        statusMsg.style.opacity = '0';
        input.focus();
    });

    document.getElementById('homeBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('close').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) {
                    document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
                }
            }
        } catch(e) {}
    }
    window.onload = loadFooter;
</script>

</body>
</html>
